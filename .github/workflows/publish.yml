name: Publish to npm

on:
  push:
    tags:
      - 'sdk-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.5.0)'
        required: false

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: 'stellar_card-sdk/package-lock.json'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: stellar_card-sdk
        run: npm ci

      - name: Lint
        working-directory: stellar_card-sdk
        run: npm run lint
        continue-on-error: true

      - name: Type check
        working-directory: stellar_card-sdk
        run: npm run typecheck

      - name: Run tests
        working-directory: stellar_card-sdk
        run: npm run test
        env:
          CARDS402_ALLOW_INSECURE_BASE_URL: '1'

      - name: Build
        working-directory: stellar_card-sdk
        run: npm run build

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref }}" 
            VERSION="${VERSION#refs/tags/sdk-v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            VERSION="${{ github.event.inputs.version }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Verify version matches package.json
        working-directory: stellar_card-sdk
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [[ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "Version mismatch: $PKG_VERSION != ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Create release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG_SECTION=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" stellar_card-sdk/CHANGELOG.md | head -n -1)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish to npm
        working-directory: stellar_card-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: sdk-v${{ steps.version.outputs.version }}
          release_name: SDK v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false

      - name: Comment on related issues
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const message = `✅ Published to npm as v${version}. Install with: \`npm install stellar_card@${version}\``;
            
            // Find and comment on PRs with this version
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: publish
    if: success()
    steps:
      - uses: slackapi/slack-github-action@v1
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          payload: |
            {
              "text": "SDK v${{ needs.publish.outputs.version }} published to npm",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*stellar_card SDK Released*\nVersion: v${{ needs.publish.outputs.version }}\n<https://www.npmjs.com/package/stellar_card|View on npm>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
