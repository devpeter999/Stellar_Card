name: Release

on:
  workflow_dispatch:
    inputs:
      version-type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: 'stellar_card-sdk/package-lock.json'

      - name: Install dependencies
        working-directory: stellar_card-sdk
        run: npm ci

      - name: Get current version
        id: current
        working-directory: stellar_card-sdk
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: version
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          TYPE="${{ github.event.inputs.version-type }}"
          
          # Parse current version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          case "$TYPE" in
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            prerelease)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))-rc.1"
              ;;
          esac
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping from $CURRENT to $NEW_VERSION"

      - name: Update package.json
        working-directory: stellar_card-sdk
        run: |
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version

      - name: Generate changelog
        id: changelog
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          CURRENT_VERSION="${{ steps.current.outputs.version }}"
          
          # Get commits since last version
          COMMITS=$(git log $CURRENT_VERSION..HEAD --oneline --format='- %s (%h)' -- stellar_card-sdk)
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## [$NEW_VERSION] - $(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Added" >> $GITHUB_OUTPUT
          echo "$COMMITS" | grep -i "feat\|add\|new" || echo "- Internal improvements" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Fixed" >> $GITHUB_OUTPUT
          echo "$COMMITS" | grep -i "fix\|bug" || echo "- Minor fixes" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Changed" >> $GITHUB_OUTPUT
          echo "$COMMITS" | grep -i "refactor\|improve" || echo "- Code improvements" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        working-directory: stellar_card-sdk
        run: |
          # Prepend new version to CHANGELOG
          {
            echo "${{ steps.changelog.outputs.changelog }}"
            echo ""
            cat CHANGELOG.md
          } > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stellar_card-sdk/package.json stellar_card-sdk/CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}" || true

      - name: Create tag
        run: |
          git tag -a "sdk-v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}" || true

      - name: Push changes and tag
        run: |
          git push origin main --follow-tags || true

  publish:
    name: Publish to npm
    needs: release
    uses: ./.github/workflows/publish.yml
    secrets: inherit
